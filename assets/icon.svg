<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ECAD0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DCC8FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DCFF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1F2A44" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGradient)"/>

  <!-- Main icon - Admin panel representation -->
  <g filter="url(#shadow)">
    <!-- Dashboard frame -->
    <rect x="212" y="212" width="600" height="600" rx="40" fill="url(#iconGradient)" opacity="0.95"/>

    <!-- Header bar -->
    <rect x="252" y="252" width="520" height="80" rx="20" fill="#1ECAD0" opacity="0.8"/>

    <!-- Menu dots -->
    <circle cx="292" cy="292" r="12" fill="white"/>
    <circle cx="332" cy="292" r="12" fill="white" opacity="0.7"/>
    <circle cx="372" cy="292" r="12" fill="white" opacity="0.5"/>

    <!-- Chart bars -->
    <rect x="292" y="420" width="60" height="180" rx="10" fill="#DCC8FF"/>
    <rect x="372" y="380" width="60" height="220" rx="10" fill="#A88CFF"/>
    <rect x="452" y="440" width="60" height="160" rx="10" fill="#DCC8FF"/>
    <rect x="532" y="360" width="60" height="240" rx="10" fill="#1ECAD0"/>
    <rect x="612" y="400" width="60" height="200" rx="10" fill="#4DD9DE"/>

    <!-- Data points -->
    <circle cx="322" cy="400" r="8" fill="#1F2A44"/>
    <circle cx="402" cy="360" r="8" fill="#1F2A44"/>
    <circle cx="482" cy="420" r="8" fill="#1F2A44"/>
    <circle cx="562" cy="340" r="8" fill="#1F2A44"/>
    <circle cx="642" cy="380" r="8" fill="#1F2A44"/>

    <!-- Connection lines -->
    <path d="M322 400 L402 360 L482 420 L562 340 L642 380" stroke="#1F2A44" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

    <!-- Bottom stats -->
    <rect x="292" y="660" width="140" height="80" rx="15" fill="#1ECAD0" opacity="0.2"/>
    <rect x="442" y="660" width="140" height="80" rx="15" fill="#DCC8FF" opacity="0.3"/>
    <rect x="592" y="660" width="140" height="80" rx="15" fill="#A88CFF" opacity="0.2"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="180" cy="180" r="40" fill="white" opacity="0.1"/>
  <circle cx="844" cy="180" r="30" fill="white" opacity="0.15"/>
  <circle cx="180" cy="844" r="30" fill="white" opacity="0.15"/>
  <circle cx="844" cy="844" r="40" fill="white" opacity="0.1"/>
</svg>
